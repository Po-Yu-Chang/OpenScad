<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCad 3D Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }
        #viewport { width: 100%; height: 100%; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #cdd6f4; font-family: sans-serif; font-size: 14px;
            display: none;
        }
        #info {
            position: absolute; bottom: 10px; left: 10px;
            color: #a6adc8; font-family: monospace; font-size: 12px;
            pointer-events: none;
        }
        #highlight-indicator {
            position: absolute; top: 10px; right: 10px;
            color: #f9e2af; font-family: sans-serif; font-size: 12px;
            display: none;
            background: rgba(30,30,46,0.8); padding: 4px 12px; border-radius: 4px;
        }

        /* ── Heads-up View Toolbar (top center) ── */
        #view-toolbar {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 4px;
            background: rgba(30,30,46,0.8); border-radius: 8px; padding: 4px;
            z-index: 10;
        }
        #view-toolbar button {
            background: transparent; border: none; color: #cdd6f4;
            font-family: sans-serif; font-size: 13px;
            padding: 4px 10px; border-radius: 6px; cursor: pointer;
        }
        #view-toolbar button:hover { background: #45475a; }
        #view-toolbar button.active { background: #89b4fa; color: #1e1e2e; }

        /* ── Sketch Mode Overlays ── */
        #sketch-toolbar {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            display: none; gap: 4px; align-items: center;
            background: rgba(30,30,46,0.9); border-radius: 8px; padding: 4px 8px;
            z-index: 20;
        }
        #sketch-toolbar button {
            background: transparent; border: 1px solid #45475a; color: #cdd6f4;
            font-family: sans-serif; font-size: 13px;
            padding: 4px 10px; border-radius: 6px; cursor: pointer;
        }
        #sketch-toolbar button:hover { background: #45475a; }
        #sketch-toolbar button.active { background: #89b4fa; color: #1e1e2e; }
        #sketch-toolbar .separator { color: #45475a; margin: 0 2px; }

        /* Constraint / DOF Status Bar (bottom center, sketch mode) */
        #constraint-status {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: none; gap: 8px; align-items: center;
            background: rgba(30,30,46,0.9); border-radius: 8px; padding: 4px 12px;
            z-index: 20; font-family: monospace; font-size: 12px; color: #cdd6f4;
        }
        #constraint-status .dof-full { color: #a6e3a1; }
        #constraint-status .dof-under { color: #f9e2af; }
        #constraint-status .dof-over { color: #f38ba8; }
        #constraint-status .conflict-item {
            color: #f38ba8; cursor: pointer; text-decoration: underline;
        }

        /* Confirmation Corner (top right) */
        #confirm-corner {
            position: absolute; top: 10px; right: 10px;
            display: none; gap: 8px; z-index: 20;
        }
        #confirm-corner button {
            width: 40px; height: 40px; border-radius: 8px; border: none;
            font-size: 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        #confirm-corner .btn-ok { background: #a6e3a1; color: #1e1e2e; }
        #confirm-corner .btn-cancel { background: #f38ba8; color: #1e1e2e; }

        /* PropertyManager Dialog (top left) */
        #prop-manager {
            position: absolute; top: 50px; left: 10px;
            display: none;
            background: rgba(30,30,46,0.95); border: 1px solid #45475a; border-radius: 8px;
            padding: 12px; min-width: 220px; z-index: 20;
            font-family: sans-serif; color: #cdd6f4;
        }
        #prop-manager h3 { font-size: 13px; margin-bottom: 8px; color: #89b4fa; }
        #prop-manager .group { border: 1px solid #313244; border-radius: 4px; padding: 6px; margin-bottom: 6px; }
        #prop-manager .group-title { font-size: 11px; color: #a6adc8; margin-bottom: 4px; }
        #prop-manager label { display: block; font-size: 11px; color: #a6adc8; margin: 2px 0; }
        #prop-manager input {
            width: 100%; background: #313244; border: 1px solid #45475a; color: #cdd6f4;
            font-size: 12px; padding: 2px 4px; border-radius: 3px;
        }
        #prop-manager .pm-buttons { display: flex; gap: 4px; margin-top: 8px; }
        #prop-manager .pm-buttons button {
            flex: 1; padding: 4px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        #prop-manager .pm-ok { background: #a6e3a1; color: #1e1e2e; }
        #prop-manager .pm-cancel { background: #45475a; color: #cdd6f4; }

        /* Sketch status bar (bottom) */
        #sketch-status {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: none; color: #a6adc8; font-family: sans-serif; font-size: 12px;
            background: rgba(30,30,46,0.8); padding: 4px 12px; border-radius: 4px; z-index: 20;
        }

        /* Dimension labels (sketch entities) */
        .dim-label {
            position: absolute; color: #89b4fa; font-family: monospace; font-size: 11px;
            background: rgba(30,30,46,0.8); padding: 1px 4px; border-radius: 3px;
            pointer-events: auto; cursor: pointer; z-index: 15;
            transform: translate(-50%, -50%);
        }
        .dim-label:hover { color: #f9e2af; }
    </style>
</head>
<body>
    <div id="viewport"></div>
    <div id="loading">載入模型中...</div>
    <div id="highlight-indicator"></div>
    <div id="info"></div>

    <!-- Heads-up View Toolbar -->
    <div id="view-toolbar">
        <button onclick="setView('iso')">等角</button>
        <button onclick="setView('front')">正視</button>
        <button onclick="setView('top')">俯視</button>
        <button onclick="setView('right')">右視</button>
        <button onclick="zoomFit()">縮放至適合</button>
        <button id="btn-clip" onclick="toggleClipPlane()">剖面</button>
        <button id="btn-datum" onclick="onToggleDatumPlanes()">基準面</button>
    </div>
    <div id="clip-controls" style="display:none; position:fixed; top:54px; right:12px; background:#1e1e2e; padding:8px 12px; border-radius:8px; border:1px solid #45475a; z-index:100; font-size:12px; color:#cdd6f4;">
        <label>剖面軸:
            <select id="clip-axis" onchange="updateClipPlane()">
                <option value="x">X</option>
                <option value="y" selected>Y</option>
                <option value="z">Z</option>
            </select>
        </label>
        <label style="margin-left:8px;">位置:
            <input type="range" id="clip-pos" min="-100" max="100" value="0" step="1" oninput="updateClipPlane()" style="width:120px; vertical-align:middle;" />
            <span id="clip-pos-val">0</span> mm
        </label>
        <label style="margin-left:8px;">反轉:
            <input type="checkbox" id="clip-flip" onchange="updateClipPlane()" />
        </label>
    </div>

    <!-- Sketch Mode Toolbar -->
    <div id="sketch-toolbar">
        <button id="tool-select" class="active" onclick="sketchTool('select')">選取</button>
        <button id="tool-rect" onclick="sketchTool('rect')">▭ 矩形</button>
        <button id="tool-circle" onclick="sketchTool('circle')">○ 圓</button>
        <button id="tool-slot" onclick="sketchTool('slot')">⬭ 長圓孔</button>
        <button id="tool-poly" onclick="sketchTool('polygon')">⬡ 多邊形</button>
        <button id="tool-line" onclick="sketchTool('line')">╱ 線</button>
        <button id="tool-arc" onclick="sketchTool('arc')">◜ 弧</button>
        <span class="separator">|</span>
        <button onclick="addConstraint('horizontal')">━ 水平</button>
        <button onclick="addConstraint('vertical')">┃ 鉛直</button>
        <button onclick="addConstraint('coincident')">⊙ 重合</button>
        <button onclick="addConstraint('distance')">↔ 距離</button>
        <button onclick="addConstraint('radius')">R 半徑</button>
        <button onclick="addConstraint('equal')">= 等長</button>
        <button onclick="addConstraint('parallel')">∥ 平行</button>
        <button onclick="addConstraint('perpendicular')">⊥ 垂直</button>
        <button onclick="addConstraint('concentric')">◎ 同心</button>
        <span class="separator">|</span>
        <button onclick="sketchDeleteSelected()">🗑 刪除</button>
    </div>

    <!-- Confirmation Corner -->
    <div id="confirm-corner">
        <button class="btn-ok" onclick="sketchCommit()">✓</button>
        <button class="btn-cancel" onclick="sketchCancel()">✗</button>
    </div>

    <!-- Constraint / DOF Status Bar -->
    <div id="constraint-status">
        <span id="dof-text">自由度：—</span>
        <span id="conflict-list"></span>
    </div>

    <!-- PropertyManager Dialog -->
    <div id="prop-manager">
        <h3 id="pm-title">矩形</h3>
        <div class="group">
            <div class="group-title">位置</div>
            <label>中心 X<input type="number" id="pm-cx" step="1"></label>
            <label>中心 Y<input type="number" id="pm-cy" step="1"></label>
        </div>
        <div class="group" id="pm-size-group">
            <div class="group-title">尺寸</div>
            <div id="pm-size-fields"></div>
        </div>
        <div class="pm-buttons">
            <button class="pm-ok" onclick="pmOk()">✓ 確定</button>
            <button class="pm-cancel" onclick="pmCancel()">✗ 取消</button>
        </div>
    </div>

    <!-- Sketch Status -->
    <div id="sketch-status">0 個實體，參數化定義</div>

    <script type="importmap">
    {
        "imports": {
            "three": "./assets/three/three.module.js",
            "three/addons/": "./assets/three/addons/"
        }
    }
    </script>

    <script type="module">
        // ─── 跨平台訊息橋接 ───
        // 統一入口：不論 WebView2 (Windows)、WKWebView (macOS)、WebKitGTK (Linux)
        // 都透過同一個函式發送訊息。訊息也推入佇列供 C# 端輪詢讀取。
        window._opencadMessageQueue = [];
        window.opencadNotify = function(msg) {
            // 推入佇列供 C# ExecuteScriptAsync 輪詢
            window._opencadMessageQueue.push(JSON.stringify(msg));
            // 嘗試原生橋接（三平台皆可能可用）
            try { window.chrome?.webview?.postMessage(msg); } catch (e) {}
            try { window.webkit?.messageHandlers?.opencad?.postMessage(msg); } catch (e) {}
            try { window.opencad?.postMessage(msg); } catch (e) {}
        };
        // C# 端呼叫此函式取出並清空佇列
        window.opencadDrainMessages = function() {
            var q = window._opencadMessageQueue || [];
            window._opencadMessageQueue = [];
            return JSON.stringify(q);
        };

        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ─── 場景設定 ───
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e2e);

        let camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(100, 80, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.localClippingEnabled = true;
        document.getElementById('viewport').appendChild(renderer.domElement);

        // ─── 控制器 ───
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // ─── 光源 ───
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 200, 100);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
        dirLight2.position.set(-100, 100, -100);
        scene.add(dirLight2);

        // ─── 格線 ───
        const grid = new THREE.GridHelper(500, 50, 0x45475a, 0x313244);
        scene.add(grid);

        // ─── 選取輔助 ───
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let highlightedMesh = null;
        let originalMaterial = null;

        // ─── display_map 狀態 ───
        let displayMap = null;       // display_map JSON（面/邊拓撲對應表）
        let currentMeshRevision = 0;  // 目前載入的 mesh_revision

        // ─── 拖曳偵測（mousedown→mouseup 位移 >4px 視為旋轉，不觸發選取）───
        let mouseDownPos = null;
        renderer.domElement.addEventListener('mousedown', (event) => {
            mouseDownPos = { x: event.clientX, y: event.clientY };
        });

        // 共用 picking：滑鼠事件 → NDC → raycast（量測與選取都走這裡，改 picking 數學只改一處）
        function pickAtEvent(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            return raycaster.intersectObjects([...scene.children, ...datumGroup.children], true);
        }

        // 共用高亮：材質置換（黃色）；opts 可覆寫 transparent/opacity 等
        function highlightMesh(mesh, opts) {
            if (highlightedMesh && originalMaterial) {
                highlightedMesh.material = originalMaterial;
            }
            highlightedMesh = mesh;
            originalMaterial = mesh.material.clone();
            mesh.material = new THREE.MeshStandardMaterial(Object.assign({
                color: 0xf9e2af,
                metalness: 0.3,
                roughness: 0.4,
            }, opts || {}));
        }

        renderer.domElement.addEventListener('click', (event) => {
            if (sketchMode) return;
            // 拖曳偵測：mousedown→click 位移 >4px = 旋轉，不是點擊選取
            if (mouseDownPos) {
                const dx = event.clientX - mouseDownPos.x;
                const dy = event.clientY - mouseDownPos.y;
                if (Math.sqrt(dx * dx + dy * dy) > 4) return;
            }
            // WP1-4: 量測模式——點擊收集面/點，計算距離
            if (measureMode) {
                const intersects = pickAtEvent(event);
                for (const intersect of intersects) {
                    if (intersect.object.isMesh && intersect.object !== grid) {
                        const point = intersect.point.clone();
                        measurePoints.push(point);
                        // 標記點
                        const marker = new THREE.Mesh(
                            new THREE.SphereGeometry(1.5, 16, 16),
                            new THREE.MeshBasicMaterial({ color: 0xff6b35 })
                        );
                        marker.position.copy(point);
                        scene.add(marker);
                        measureLabels.push(marker);
                        // 兩點時計算距離
                        if (measurePoints.length >= 2) {
                            const p1 = measurePoints[0];
                            const p2 = measurePoints[1];
                            const dist = p1.distanceTo(p2);
                            // 畫線
                            const geom = new THREE.BufferGeometry().setFromPoints([p1, p2]);
                            const line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0xff6b35, linewidth: 2 }));
                            scene.add(line);
                            measureLabels.push(line);
                            // 通知主程式
                            window.opencadNotify({
                                type: 'measurement_result',
                                measurement_type: 'distance',
                                value: dist.toFixed(2),
                                unit: 'mm',
                                description: '兩點距離: ' + dist.toFixed(2) + ' mm'
                            });
                            document.getElementById('highlight-indicator').textContent =
                                '量測結果: ' + dist.toFixed(2) + ' mm';
                            document.getElementById('highlight-indicator').style.display = 'block';
                            // 重置以進行下一次量測
                            measurePoints = [];
                        }
                        break;
                    }
                }
                return;
            }
            const intersects = pickAtEvent(event);
            for (const intersect of intersects) {
                if (intersect.object.name.startsWith('__plane_')) {
                    // 隱藏中的基準面不攔截點擊——讓射線繼續檢查後面的模型
                    if (!intersect.object.visible) continue;
                    window.opencadNotify({
                        type: 'datum_plane_clicked',
                        name: intersect.object.name
                    });
                    break;
                }
                if (intersect.object.isMesh && intersect.object !== grid) {
                    // ── display_map picking：三角面索引 → face 查詢 ──
                    // （displayMap 只由 loadModelWithMap 設定、loadModel 會清空——
                    //   保證 map 與場景中的 GLB 永遠來自同一次載入，不需逐面 revision 檢查）
                    if (displayMap && intersect.faceIndex !== undefined) {
                        const faceEntry = findFaceByTriangleIndex(displayMap.faces, intersect.faceIndex);
                        if (faceEntry) {
                            // 高亮所選 mesh（TODO：依 triangle_range 做真正的逐面高亮）
                            highlightMesh(intersect.object, { transparent: true, opacity: 0.85 });
                            // 通知主程式
                            window.opencadNotify({
                                type: 'face_selected',
                                brep_face_ref: faceEntry.brep_face_ref,
                                source_feature_id: faceEntry.source_feature_id,
                                mesh_revision: currentMeshRevision,
                            });
                            document.getElementById('highlight-indicator').textContent =
                                `已選取面: ${faceEntry.surface_type} (${faceEntry.source_feature_id})`;
                            document.getElementById('highlight-indicator').style.display = 'block';
                            break;
                        }
                    }
                    // fallback：無 display_map 時沿用舊行為
                    highlightMesh(intersect.object);
                    window.opencadNotify({
                        type: 'selection',
                        object: intersect.object.name || 'unknown',
                    });
                    document.getElementById('highlight-indicator').textContent = `已選取: ${intersect.object.name || '模型'}`;
                    document.getElementById('highlight-indicator').style.display = 'block';
                    break;
                }
            }
        });

        /// 由三角面索引（faceIndex）在 display_map 中查詢所屬面。
        /// triangle_range = [start, end)，使用二分搜尋。
        function findFaceByTriangleIndex(faces, triIdx) {
            if (!faces || faces.length === 0) return null;
            let lo = 0, hi = faces.length - 1;
            while (lo <= hi) {
                const mid = (lo + hi) >> 1;
                const range = faces[mid].triangle_range;
                if (!range || range.length < 2) { lo = mid + 1; continue; }
                if (triIdx < range[0]) { hi = mid - 1; }
                else if (triIdx >= range[1]) { lo = mid + 1; }
                else { return faces[mid]; }
            }
            return null;
        }

        // ─── 模型載入 ───
        const loader = new GLTFLoader();
        let currentModel = null;

        window.loadModel = function(url, keepMap) {
            document.getElementById('loading').style.display = 'block';
            // 未帶 map 的載入使既有 display_map 失效——
            // 否則舊 map 會被用來解析新 mesh 的 faceIndex，選到錯的面
            if (!keepMap) {
                displayMap = null;
                currentMeshRevision = 0;
            }
            // 清除舊模型
            if (currentModel) {
                scene.remove(currentModel);
                currentModel = null;
            }

            loader.load(url, (gltf) => {
                currentModel = gltf.scene;

                // 居中並調整大小
                const box = new THREE.Box3().setFromObject(currentModel);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 100 / maxDim;

                currentModel.scale.setScalar(scale);
                currentModel.position.sub(center.multiplyScalar(scale));

                // 為每個 Mesh 設定陰影和名稱
                currentModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if (!child.name) child.name = 'mesh_' + child.id;
                    }
                });

                scene.add(currentModel);
                document.getElementById('loading').style.display = 'none';

                // 若剖面已啟用，重新套用至新模型
                if (clipPlaneActive) updateClipPlane();

                // 更新資訊
                document.getElementById('info').textContent =
                    `模型尺寸: ${(size.x).toFixed(1)} × ${(size.y).toFixed(1)} × ${(size.z).toFixed(1)} mm`;

                // 通知主程式
                window.opencadNotify({
                    type: 'loaded',
                    size: { x: size.x, y: size.y, z: size.z },
                });
            }, (progress) => {
                const pct = (progress.loaded / progress.total * 100).toFixed(0);
                document.getElementById('loading').textContent = `載入中... ${pct}%`;
            }, (error) => {
                document.getElementById('loading').textContent = '載入失敗';
                console.error('GLB 載入失敗:', error);
                window.opencadNotify({ type: 'error', message: String(error) });
            });
        };

        // ── loadModelWithMap：載入 GLB 後同時載入 display_map ──
        window.loadModelWithMap = function(glbUrl, mapUrl) {
            // 先載入 display_map
            fetch(mapUrl)
                .then(r => {
                    if (!r.ok) throw new Error('display_map HTTP ' + r.status);
                    return r.json();
                })
                .then(data => {
                    displayMap = data;
                    currentMeshRevision = data.mesh_revision || 0;
                    // 再載入 GLB（keepMap=true：map 與此 GLB 來自同一次載入）
                    window.loadModel(glbUrl, true);
                })
                .catch(err => {
                    console.warn('display_map 載入失敗，使用 fallback picking:', err);
                    displayMap = null;
                    window.loadModel(glbUrl);
                });
        };

        // ─── 視角控制 API ───
        window.setView = function(view) {
            const box = currentModel ? new THREE.Box3().setFromObject(currentModel) : null;
            const dist = 200;
            switch(view) {
                case 'iso':
                    camera.position.set(dist, dist * 0.7, dist);
                    break;
                case 'front':
                    camera.position.set(0, 0, dist);
                    break;
                case 'top':
                    camera.position.set(0, dist, 0);
                    break;
                case 'right':
                    camera.position.set(dist, 0, 0);
                    break;
            }
            controls.target.set(0, 0, 0);
            controls.update();
        };

        // ─── 剖面視圖 ───
        let clipPlaneActive = false;
        let clipPlane = new THREE.Vector3(0, -1, 0);
        let clipConstant = 0;

        window.toggleClipPlane = function() {
            clipPlaneActive = !clipPlaneActive;
            document.getElementById('clip-controls').style.display = clipPlaneActive ? 'block' : 'none';
            document.getElementById('btn-clip').classList.toggle('active', clipPlaneActive);
            updateClipPlane();
        };

        window.updateClipPlane = function() {
            if (!clipPlaneActive || !currentModel) {
                if (currentModel) {
                    currentModel.traverse((child) => {
                        if (child.isMesh && child.material) {
                            child.material.clippingPlanes = [];
                        }
                    });
                }
                return;
            }
            const axis = document.getElementById('clip-axis').value;
            const pos = parseFloat(document.getElementById('clip-pos').value);
            const flip = document.getElementById('clip-flip').checked;
            document.getElementById('clip-pos-val').textContent = pos;

            const dir = flip ? -1 : 1;
            if (axis === 'x') clipPlane = new THREE.Vector3(dir, 0, 0);
            else if (axis === 'y') clipPlane = new THREE.Vector3(0, dir, 0);
            else clipPlane = new THREE.Vector3(0, 0, dir);
            clipConstant = pos * -dir;  // Three.js plane: dot(normal, point) + constant = 0

            const plane = new THREE.Plane(clipPlane, clipConstant);
            currentModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.material.clippingPlanes = [plane];
                    child.material.clipShadows = true;
                }
            });
        };

        // 依 mesh 名稱高亮（供特徵樹選取連動）。
        // 目前 GLB 匯出為單一合併網格，名稱多半不匹配——找不到時靜默略過；
        // Phase 2 逐特徵匯出 mesh 後此函式即可生效。
        window.highlightByName = function(name) {
            window.clearHighlight();
            if (!currentModel || !name) return;
            let target = null;
            currentModel.traverse((child) => {
                if (!target && child.isMesh && child.name === name) target = child;
            });
            if (!target) return;
            highlightedMesh = target;
            originalMaterial = target.material.clone();
            target.material = new THREE.MeshStandardMaterial({
                color: 0xf9e2af,
                metalness: 0.3,
                roughness: 0.4,
            });
            document.getElementById('highlight-indicator').textContent = `已選取: ${name}`;
            document.getElementById('highlight-indicator').style.display = 'block';
        };

        window.clearHighlight = function() {
            if (highlightedMesh && originalMaterial) {
                highlightedMesh.material = originalMaterial;
                highlightedMesh = null;
                originalMaterial = null;
            }
            document.getElementById('highlight-indicator').style.display = 'none';
        };

        // ─── Zoom to Fit ───
        window.zoomFit = function() {
            if (!currentModel) return;
            const box = new THREE.Box3().setFromObject(currentModel);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const dist = maxDim * 1.5;
            camera.position.set(center.x + dist * 0.7, center.y + dist * 0.5, center.z + dist);
            controls.target.copy(center);
            controls.update();
        };

        // ═══════════════════════════════════════════
        // ─── Sketch Mode ───
        // ═══════════════════════════════════════════

        let sketchMode = false;
        let sketchFeatureId = null;
        let sketchPlaneBase = 'XY';
        let sketchEntities = [];
        let sketchMeshes = [];
        let sketchDimLabels = [];
        let sketchSelectedIndex = -1;
        let sketchTool = 'select';
        let sketchOrthoCamera = null;
        let sketchGrid = null;
        let sketchAxes = null;
        let savedCamera = null;

        // PropertyManager state
        let pmCallback = null;
        let pmEditingIndex = -1;

        function enterSketchMode(featureId, entities, plane) {
            sketchMode = true;
            sketchFeatureId = featureId;
            sketchEntities = entities ? (Array.isArray(entities) ? entities : JSON.parse(entities)) : [];
            sketchSelectedIndex = -1;
            sketchTool = 'select';
            sketchConstraints = [];
            showConstraintBar();

            // Parse plane (default XY = Top)
            var planeObj = (plane && typeof plane === 'object') ? plane : (plane ? JSON.parse(plane) : {});
            sketchPlaneBase = planeObj.base || 'XY';

            // Save and switch to orthographic camera, oriented normal-to the plane
            savedCamera = camera;
            sketchOrthoCamera = new THREE.OrthographicCamera(
                -window.innerWidth / 2, window.innerWidth / 2,
                window.innerHeight / 2, -window.innerHeight / 2,
                -1000, 2000
            );

            if (sketchPlaneBase === 'XZ') {
                // Front plane: camera looks along -Y (from the plane's anti-normal side,
                // matching build123d Plane.XZ's z_dir=-Y) so screen-right = +X, matching
                // the XY/YZ views instead of being horizontally mirrored.
                sketchOrthoCamera.position.set(0, -500, 0);
                sketchOrthoCamera.up.set(0, 0, 1);
            } else if (sketchPlaneBase === 'YZ') {
                // Right plane: camera looks along +X, grid in YZ
                sketchOrthoCamera.position.set(500, 0, 0);
                sketchOrthoCamera.up.set(0, 0, 1);
            } else {
                // XY = Top: camera looks along +Z, grid in XY
                sketchOrthoCamera.position.set(0, 0, 500);
                sketchOrthoCamera.up.set(0, 1, 0);
            }
            sketchOrthoCamera.lookAt(0, 0, 0);
            camera = sketchOrthoCamera;

            // Disable rotation, keep pan and zoom
            controls.enableRotate = false;
            controls.target.set(0, 0, 0);
            controls.update();

            // Hide 3D model and datum planes
            if (currentModel) currentModel.visible = false;
            grid.visible = false;
            datumGroup.visible = false;

            // Show sketch grid (10mm spacing), oriented to the plane
            sketchGrid = new THREE.GridHelper(500, 50, 0x45475a, 0x313244);
            if (sketchPlaneBase === 'XY') {
                // GridHelper is in XZ by default; rotate to XY
                sketchGrid.rotation.x = Math.PI / 2;
            } else if (sketchPlaneBase === 'YZ') {
                // Rotate grid to YZ plane
                sketchGrid.rotation.z = Math.PI / 2;
            }
            // XZ: GridHelper default is already XZ, no rotation needed
            scene.add(sketchGrid);

            // Axes (red=X, green=Y or Z depending on plane)
            sketchAxes = new THREE.Group();
            var axisXGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-250, 0, 0), new THREE.Vector3(250, 0, 0)
            ]);
            var axisX = new THREE.LineSegments(axisXGeo, new THREE.LineBasicMaterial({ color: 0xf38ba8 }));
            sketchAxes.add(axisX);

            if (sketchPlaneBase === 'XY') {
                // Y axis is green
                var axisYGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, -250, 0), new THREE.Vector3(0, 250, 0)
                ]);
                sketchAxes.add(new THREE.LineSegments(axisYGeo, new THREE.LineBasicMaterial({ color: 0xa6e3a1 })));
            } else if (sketchPlaneBase === 'XZ') {
                // Z axis is green (vertical on screen)
                var axisZGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, 0, -250), new THREE.Vector3(0, 0, 250)
                ]);
                sketchAxes.add(new THREE.LineSegments(axisZGeo, new THREE.LineBasicMaterial({ color: 0xa6e3a1 })));
            } else {
                // YZ: Y horizontal, Z vertical
                var axisY2Geo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, -250, 0), new THREE.Vector3(0, 250, 0)
                ]);
                sketchAxes.add(new THREE.LineSegments(axisY2Geo, new THREE.LineBasicMaterial({ color: 0xa6e3a1 })));
                var axisZ2Geo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, 0, -250), new THREE.Vector3(0, 0, 250)
                ]);
                sketchAxes.add(new THREE.LineSegments(axisZ2Geo, new THREE.LineBasicMaterial({ color: 0xa6e3a1 })));
            }
            scene.add(sketchAxes);

            // Show UI overlays
            document.getElementById('view-toolbar').style.display = 'none';
            document.getElementById('sketch-toolbar').style.display = 'flex';
            document.getElementById('confirm-corner').style.display = 'flex';
            document.getElementById('sketch-status').style.display = 'block';

            // Render existing entities
            renderSketchEntities();
            updateSketchStatus();
        }

        function exitSketchMode() {
            if (!sketchMode) return;
            sketchMode = false;
            sketchPlaneBase = 'XY';
            sketchConstraints = [];
            hideConstraintBar();

            // Restore camera
            if (savedCamera) {
                camera = savedCamera;
                savedCamera = null;
            }
            sketchOrthoCamera = null;
            controls.enableRotate = true;
            controls.update();

            // Restore model and datum planes
            if (currentModel) currentModel.visible = true;
            grid.visible = true;
            datumGroup.visible = true;

            // Remove sketch grid and axes
            if (sketchGrid) { scene.remove(sketchGrid); sketchGrid = null; }
            if (sketchAxes) { scene.remove(sketchAxes); sketchAxes = null; }

            // Clear sketch meshes and labels
            clearSketchMeshes();

            // Hide UI overlays
            document.getElementById('view-toolbar').style.display = 'flex';
            document.getElementById('sketch-toolbar').style.display = 'none';
            document.getElementById('confirm-corner').style.display = 'none';
            document.getElementById('sketch-status').style.display = 'none';
            document.getElementById('prop-manager').style.display = 'none';
        }

        function clearSketchMeshes() {
            sketchMeshes.forEach(m => scene.remove(m));
            sketchMeshes = [];
            sketchDimLabels.forEach(l => l.remove());
            sketchDimLabels = [];
        }

        function renderSketchEntities() {
            clearSketchMeshes();
            sketchEntities.forEach((entity, idx) => {
                const mesh = createEntityMesh(entity, idx === sketchSelectedIndex);
                if (mesh) { scene.add(mesh); sketchMeshes.push(mesh); }
                createDimLabel(entity, idx);
            });
        }

        // Map 2D sketch coords (x, y) to 3D world coords based on current plane
        function sketchToWorld(x, y) {
            if (sketchPlaneBase === 'XZ') return new THREE.Vector3(x, 0, y);
            if (sketchPlaneBase === 'YZ') return new THREE.Vector3(0, x, y);
            return new THREE.Vector3(x, y, 0);  // XY
        }

        function createEntityMesh(entity, isSelected) {
            const color = isSelected ? 0xf9e2af : 0x89b4fa;
            const mat = new THREE.LineBasicMaterial({ color });
            const type = entity.entity_type || entity.type;

            if (type === 'rectangle') {
                const cx = entity.center_x || 0, cy = entity.center_y || 0;
                const w = entity.width || 0, h = entity.height || 0;
                const geo = new THREE.BufferGeometry().setFromPoints([
                    sketchToWorld(cx - w/2, cy - h/2),
                    sketchToWorld(cx + w/2, cy - h/2),
                    sketchToWorld(cx + w/2, cy + h/2),
                    sketchToWorld(cx - w/2, cy + h/2),
                    sketchToWorld(cx - w/2, cy - h/2),
                ]);
                return new THREE.Line(geo, mat);
            }

            if (type === 'circle') {
                const cx = entity.center_x || 0, cy = entity.center_y || 0;
                const r = entity.radius || 0;
                const points = [];
                const segs = 64;
                for (let i = 0; i <= segs; i++) {
                    const a = (i / segs) * Math.PI * 2;
                    points.push(sketchToWorld(cx + Math.cos(a) * r, cy + Math.sin(a) * r));
                }
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                return new THREE.Line(geo, mat);
            }

            if (type === 'slot') {
                const cx = entity.center_x || 0, cy = entity.center_y || 0;
                const len = entity.length || 0, wid = entity.width || 0;
                const ang = (entity.angle || 0) * Math.PI / 180;
                const r = wid / 2;
                const halfL = Math.max(0, len / 2 - r);
                const cos = Math.cos(ang), sin = Math.sin(ang);
                // Helper to transform local→sketch→world
                function rot(x, y) {
                    return sketchToWorld(
                        x * cos - y * sin + cx,
                        x * sin + y * cos + cy
                    );
                }
                const points = [];
                const segs = 16;
                // Bottom edge: left to right
                points.push(rot(-halfL, -r));
                // Right semicircle: from bottom (-r) to top (+r), going clockwise (angle -90→90)
                for (let i = 1; i < segs; i++) {
                    const a = -Math.PI / 2 + (i / segs) * Math.PI;
                    points.push(rot(halfL + Math.cos(a) * r, Math.sin(a) * r));
                }
                points.push(rot(halfL, r));
                // Top edge: right to left
                points.push(rot(-halfL, r));
                // Left semicircle: from top (+r) to bottom (-r), going clockwise (angle 90→270)
                for (let i = 1; i < segs; i++) {
                    const a = Math.PI / 2 + (i / segs) * Math.PI;
                    points.push(rot(-halfL + Math.cos(a) * r, Math.sin(a) * r));
                }
                points.push(rot(-halfL, -r));
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                return new THREE.Line(geo, mat);
            }

            if (type === 'polygon') {
                const cx = entity.center_x || 0, cy = entity.center_y || 0;
                const sides = entity.sides || 6;
                const r = entity.radius || 0;
                const points = [];
                for (let i = 0; i <= sides; i++) {
                    const a = (i / sides) * Math.PI * 2 - Math.PI / 2;
                    points.push(sketchToWorld(cx + Math.cos(a) * r, cy + Math.sin(a) * r));
                }
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                return new THREE.Line(geo, mat);
            }

            if (type === 'line') {
                const x1 = entity.x1 || 0, y1 = entity.y1 || 0;
                const x2 = entity.x2 || 0, y2 = entity.y2 || 0;
                const geo = new THREE.BufferGeometry().setFromPoints([
                    sketchToWorld(x1, y1),
                    sketchToWorld(x2, y2),
                ]);
                return new THREE.Line(geo, mat);
            }

            if (type === 'polyline') {
                const verts = entity.vertices || [];
                const closed = entity.closed || false;
                const points = verts.map(v => sketchToWorld(v[0], v[1]));
                if (closed && points.length > 0) points.push(points[0]);
                if (points.length < 2) return null;
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                return new THREE.Line(geo, mat);
            }

            if (type === 'arc') {
                const cx = entity.center_x || 0, cy = entity.center_y || 0;
                const r = entity.radius || 0;
                const sa = (entity.start_angle || 0) * Math.PI / 180;
                const ea = (entity.end_angle || 0) * Math.PI / 180;
                const points = [];
                const segs = 32;
                for (let i = 0; i <= segs; i++) {
                    const a = sa + (ea - sa) * (i / segs);
                    points.push(sketchToWorld(cx + Math.cos(a) * r, cy + Math.sin(a) * r));
                }
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                return new THREE.Line(geo, mat);
            }

            if (type === 'construction_line') {
                // Construction lines are auxiliary, render as thin dashed
                const x1 = entity.x1 || 0, y1 = entity.y1 || 0;
                const x2 = entity.x2 || 0, y2 = entity.y2 || 0;
                const dashedMat = new THREE.LineDashedMaterial({ color: 0x888888, dashSize: 1, gapSize: 1 });
                const geo = new THREE.BufferGeometry().setFromPoints([
                    sketchToWorld(x1, y1),
                    sketchToWorld(x2, y2),
                ]);
                const line = new THREE.Line(geo, dashedMat);
                line.computeLineDistances();
                return line;
            }

            return null;
        }

        function createDimLabel(entity, idx) {
            const type = entity.entity_type || entity.type;
            const cx = entity.center_x || 0, cy = entity.center_y || 0;
            let text = '';
            if (type === 'rectangle') text = `${entity.width}×${entity.height}`;
            else if (type === 'circle') text = `Ø${(entity.radius * 2).toFixed(1)}`;
            else if (type === 'slot') text = `${entity.length}×${entity.width}`;
            else if (type === 'polygon') text = `${entity.sides}邊 R${entity.radius}`;
            else if (type === 'line') text = `(${entity.x1},${entity.y1})→(${entity.x2},${entity.y2})`;
            else if (type === 'arc') text = `R${entity.radius} ${entity.start_angle}°→${entity.end_angle}°`;
            else if (type === 'polyline') text = `${(entity.vertices || []).length}點${entity.closed ? '（閉合）' : ''}`;
            else if (type === 'construction_line') text = '構造線';

            const label = document.createElement('div');
            label.className = 'dim-label';
            label.textContent = text;
            label.dataset.idx = idx;
            label.ondblclick = () => {
                sketchSelectedIndex = idx;
                openPropertyManager(type, entity, idx);
            };
            label.onclick = () => {
                sketchSelectedIndex = idx;
                renderSketchEntities();
            };
            document.body.appendChild(label);
            sketchDimLabels.push(label);
        }

        function updateDimLabelPositions() {
            const w = window.innerWidth, h = window.innerHeight;
            sketchEntities.forEach((entity, idx) => {
                const label = sketchDimLabels[idx];
                if (!label) return;
                const type = entity.entity_type || entity.type;
                let cx, cy;
                if (type === 'line' || type === 'construction_line') {
                    cx = ((entity.x1 || 0) + (entity.x2 || 0)) / 2;
                    cy = ((entity.y1 || 0) + (entity.y2 || 0)) / 2;
                } else if (type === 'polyline') {
                    const verts = entity.vertices || [];
                    cx = verts.reduce((s, v) => s + v[0], 0) / Math.max(1, verts.length);
                    cy = verts.reduce((s, v) => s + v[1], 0) / Math.max(1, verts.length);
                } else {
                    cx = entity.center_x || 0;
                    cy = entity.center_y || 0;
                }
                const pos = sketchToWorld(cx, cy);
                pos.project(camera);
                label.style.left = ((pos.x + 1) / 2 * w) + 'px';
                label.style.top = ((-pos.y + 1) / 2 * h) + 'px';
            });
        }

        function updateSketchStatus() {
            document.getElementById('sketch-status').textContent =
                `${sketchEntities.length} 個實體，參數化定義`;
        }

        // ── Sketch Tool Selection ──
        window.sketchTool = function(tool) {
            sketchTool = tool;
            // Update active button
            ['select', 'rect', 'circle', 'slot', 'polygon', 'line', 'arc'].forEach(t => {
                const btn = document.getElementById('tool-' + t);
                if (btn) btn.classList.toggle('active', t === tool);
            });
        };

        // ── Canvas click in sketch mode ──
        renderer.domElement.addEventListener('click', (event) => {
            if (!sketchMode) return;
            if (sketchTool === 'select') return;

            // Get world coordinates from click
            const rect = renderer.domElement.getBoundingClientRect();
            const ndcX = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            const ndcY = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            const vec = new THREE.Vector3(ndcX, ndcY, 0);
            vec.unproject(camera);

            // Map unprojected coords to sketch plane 2D coords
            var sx, sy;
            if (sketchPlaneBase === 'XZ') {
                sx = vec.x; sy = vec.z;  // Front plane: X=horizontal, Z=vertical
            } else if (sketchPlaneBase === 'YZ') {
                sx = vec.y; sy = vec.z;  // Right plane: Y=horizontal, Z=vertical
            } else {
                sx = vec.x; sy = vec.y;  // XY (Top): X=horizontal, Y=vertical
            }

            // Snap to 1mm
            sx = Math.round(sx);
            sy = Math.round(sy);

            if (sketchTool === 'rect') openRectPM(sx, sy);
            else if (sketchTool === 'circle') openCirclePM(sx, sy);
            else if (sketchTool === 'slot') openSlotPM(sx, sy);
            else if (sketchTool === 'polygon') openPolygonPM(sx, sy);
            else if (sketchTool === 'line') openLinePM(sx, sy);
            else if (sketchTool === 'arc') openArcPM(sx, sy);
        });

        // ── PropertyManager ──
        function showPM(title, sizeFields, cx, cy, callback) {
            document.getElementById('pm-title').textContent = title;
            document.getElementById('pm-cx').value = cx;
            document.getElementById('pm-cy').value = cy;
            const sizeDiv = document.getElementById('pm-size-fields');
            sizeDiv.innerHTML = sizeFields;
            document.getElementById('prop-manager').style.display = 'block';
            pmCallback = callback;
        }

        function openRectPM(cx, cy, existing, editIdx) {
            const w = existing ? existing.width : 20;
            const h = existing ? existing.height : 20;
            showPM('矩形', `
                <label>寬<input type="number" id="pm-w" step="1" value="${w}"></label>
                <label>高<input type="number" id="pm-h" step="1" value="${h}"></label>
            `, cx, cy, () => {
                const e = {
                    entity_type: 'rectangle',
                    center_x: parseFloat(document.getElementById('pm-cx').value),
                    center_y: parseFloat(document.getElementById('pm-cy').value),
                    width: parseFloat(document.getElementById('pm-w').value),
                    height: parseFloat(document.getElementById('pm-h').value),
                };
                if (editIdx >= 0) sketchEntities[editIdx] = e;
                else sketchEntities.push(e);
                renderSketchEntities();
                updateSketchStatus();
            });
            pmEditingIndex = editIdx;
        }

        function openCirclePM(cx, cy, existing, editIdx) {
            const r = existing ? existing.radius : 10;
            showPM('圓', `
                <label>半徑<input type="number" id="pm-r" step="1" value="${r}"></label>
            `, cx, cy, () => {
                const e = {
                    entity_type: 'circle',
                    center_x: parseFloat(document.getElementById('pm-cx').value),
                    center_y: parseFloat(document.getElementById('pm-cy').value),
                    radius: parseFloat(document.getElementById('pm-r').value),
                };
                if (editIdx >= 0) sketchEntities[editIdx] = e;
                else sketchEntities.push(e);
                renderSketchEntities();
                updateSketchStatus();
            });
            pmEditingIndex = editIdx;
        }

        function openSlotPM(cx, cy, existing, editIdx) {
            const len = existing ? existing.length : 30;
            const wid = existing ? existing.width : 8;
            const ang = existing ? existing.angle : 0;
            showPM('長圓孔', `
                <label>長<input type="number" id="pm-len" step="1" value="${len}"></label>
                <label>寬<input type="number" id="pm-wid" step="1" value="${wid}"></label>
                <label>角度<input type="number" id="pm-ang" step="1" value="${ang}"></label>
            `, cx, cy, () => {
                const e = {
                    entity_type: 'slot',
                    center_x: parseFloat(document.getElementById('pm-cx').value),
                    center_y: parseFloat(document.getElementById('pm-cy').value),
                    length: parseFloat(document.getElementById('pm-len').value),
                    width: parseFloat(document.getElementById('pm-wid').value),
                    angle: parseFloat(document.getElementById('pm-ang').value),
                };
                if (editIdx >= 0) sketchEntities[editIdx] = e;
                else sketchEntities.push(e);
                renderSketchEntities();
                updateSketchStatus();
            });
            pmEditingIndex = editIdx;
        }

        function openPolygonPM(cx, cy, existing, editIdx) {
            const sides = existing ? existing.sides : 6;
            const r = existing ? existing.radius : 15;
            showPM('多邊形', `
                <label>邊數<input type="number" id="pm-sides" step="1" value="${sides}"></label>
                <label>外接圓半徑<input type="number" id="pm-r" step="1" value="${r}"></label>
            `, cx, cy, () => {
                const e = {
                    entity_type: 'polygon',
                    center_x: parseFloat(document.getElementById('pm-cx').value),
                    center_y: parseFloat(document.getElementById('pm-cy').value),
                    sides: parseInt(document.getElementById('pm-sides').value),
                    radius: parseFloat(document.getElementById('pm-r').value),
                };
                if (editIdx >= 0) sketchEntities[editIdx] = e;
                else sketchEntities.push(e);
                renderSketchEntities();
                updateSketchStatus();
            });
            pmEditingIndex = editIdx;
        }

        function openLinePM(cx, cy, existing, editIdx) {
            const x2 = existing ? existing.x2 : cx + 20;
            const y2 = existing ? existing.y2 : cy;
            // Line uses cx,cy as start point (x1,y1)
            showPM('線段', `
                <label>終點 X<input type="number" id="pm-x2" step="1" value="${x2}"></label>
                <label>終點 Y<input type="number" id="pm-y2" step="1" value="${y2}"></label>
            `, cx, cy, () => {
                const e = {
                    entity_type: 'line',
                    x1: parseFloat(document.getElementById('pm-cx').value),
                    y1: parseFloat(document.getElementById('pm-cy').value),
                    x2: parseFloat(document.getElementById('pm-x2').value),
                    y2: parseFloat(document.getElementById('pm-y2').value),
                };
                if (editIdx >= 0) sketchEntities[editIdx] = e;
                else sketchEntities.push(e);
                renderSketchEntities();
                updateSketchStatus();
            });
            pmEditingIndex = editIdx;
        }

        function openArcPM(cx, cy, existing, editIdx) {
            const r = existing ? existing.radius : 10;
            const sa = existing ? existing.start_angle : 0;
            const ea = existing ? existing.end_angle : 90;
            showPM('圓弧', `
                <label>半徑<input type="number" id="pm-r" step="1" value="${r}"></label>
                <label>起角°<input type="number" id="pm-sa" step="1" value="${sa}"></label>
                <label>終角°<input type="number" id="pm-ea" step="1" value="${ea}"></label>
            `, cx, cy, () => {
                const e = {
                    entity_type: 'arc',
                    center_x: parseFloat(document.getElementById('pm-cx').value),
                    center_y: parseFloat(document.getElementById('pm-cy').value),
                    radius: parseFloat(document.getElementById('pm-r').value),
                    start_angle: parseFloat(document.getElementById('pm-sa').value),
                    end_angle: parseFloat(document.getElementById('pm-ea').value),
                };
                if (editIdx >= 0) sketchEntities[editIdx] = e;
                else sketchEntities.push(e);
                renderSketchEntities();
                updateSketchStatus();
            });
            pmEditingIndex = editIdx;
        }

        function openPropertyManager(type, entity, editIdx) {
            const cx = entity.center_x || entity.x1 || 0, cy = entity.center_y || entity.y1 || 0;
            if (type === 'rectangle') openRectPM(cx, cy, entity, editIdx);
            else if (type === 'circle') openCirclePM(cx, cy, entity, editIdx);
            else if (type === 'slot') openSlotPM(cx, cy, entity, editIdx);
            else if (type === 'polygon') openPolygonPM(cx, cy, entity, editIdx);
            else if (type === 'line') openLinePM(entity.x1 || 0, entity.y1 || 0, entity, editIdx);
            else if (type === 'arc') openArcPM(cx, cy, entity, editIdx);
        }

        window.pmOk = function() {
            document.getElementById('prop-manager').style.display = 'none';
            if (pmCallback) { pmCallback(); pmCallback = null; }
            // Reset to select tool after creating
            if (pmEditingIndex < 0) sketchTool('select');
            pmEditingIndex = -1;
        };

        window.pmCancel = function() {
            document.getElementById('prop-manager').style.display = 'none';
            pmCallback = null;
            pmEditingIndex = -1;
            if (sketchTool !== 'select') sketchTool('select');
        };

        // ── Sketch Delete ──
        window.sketchDeleteSelected = function() {
            if (sketchSelectedIndex < 0) return;
            sketchEntities.splice(sketchSelectedIndex, 1);
            sketchSelectedIndex = -1;
            renderSketchEntities();
            updateSketchStatus();
        };

        // ── Sketch Commit / Cancel ──
        window.sketchCommit = function() {
            window.opencadNotify({
                type: 'sketch_committed',
                feature_id: sketchFeatureId,
                entities: sketchEntities,
                constraints: sketchConstraints,
            });
            exitSketchMode();
        };

        window.sketchCancel = function() {
            window.opencadNotify({ type: 'sketch_cancelled' });
            exitSketchMode();
        };

        // ═══════════════════════════════════════════
        // ─── WP1-2: Constraint Solver UI ───
        // ═══════════════════════════════════════════

        let sketchConstraints = [];
        let dragState = null;  // {entityIdx, startPoint, throttleTimer}
        const SOLVE_THROTTLE_MS = 50;

        // Show/hide constraint status bar when entering/leaving sketch mode
        function showConstraintBar() {
            document.getElementById('constraint-status').style.display = 'flex';
        }
        function hideConstraintBar() {
            document.getElementById('constraint-status').style.display = 'none';
        }

        // ── Add Constraint ──
        window.addConstraint = function(type) {
            if (sketchSelectedIndex < 0 && type !== 'horizontal' && type !== 'vertical') {
                alert('請先選取實體再加約束');
                return;
            }

            var constraintId = 'c' + (sketchConstraints.length + 1);
            var targets = [];
            var value_mm = null;
            var value_deg = null;
            var name = '';

            // Get entity ID from selected entity
            function getEid(idx) {
                var e = sketchEntities[idx];
                return e.id || ('e' + (idx + 1));
            }

            if (type === 'horizontal' || type === 'vertical') {
                // Apply to selected line entity
                if (sketchSelectedIndex < 0) {
                    alert('請先選取線段');
                    return;
                }
                targets = [getEid(sketchSelectedIndex)];
            } else if (type === 'coincident' || type === 'concentric' || type === 'distance' || type === 'equal' || type === 'parallel' || type === 'perpendicular' || type === 'midpoint' || type === 'symmetric' || type === 'tangent') {
                // Need 2 selected entities — for now use selected + previous
                if (sketchSelectedIndex < 0) {
                    alert('請先選取實體');
                    return;
                }
                targets = [getEid(sketchSelectedIndex)];
                // Try to find a second selected entity — simplified: use first entity
                if (sketchEntities.length > 1) {
                    var secondIdx = sketchSelectedIndex === 0 ? 1 : sketchSelectedIndex - 1;
                    targets.push(getEid(secondIdx));
                }
            } else if (type === 'radius' || type === 'diameter') {
                if (sketchSelectedIndex < 0) {
                    alert('請先選取圓/弧');
                    return;
                }
                targets = [getEid(sketchSelectedIndex)];
                var e = sketchEntities[sketchSelectedIndex];
                var params = e.parameters || e;
                var currentR = params.radius || params.r || 5;
                value_mm = type === 'diameter' ? currentR * 2 : currentR;
                name = type === 'diameter' ? '⌀' : 'R';
            } else if (type === 'angle') {
                if (sketchSelectedIndex < 0) return;
                targets = [getEid(sketchSelectedIndex)];
                value_deg = 90;
            }

            // For distance, prompt for value
            if (type === 'distance') {
                var val = prompt('距離值 (mm):', '60');
                if (val === null) return;
                value_mm = parseFloat(val);
                name = 'd' + (sketchConstraints.filter(c => c.type === 'distance').length + 1);
            } else if (type === 'radius') {
                var val = prompt('半徑值 (mm):', String(value_mm));
                if (val === null) return;
                value_mm = parseFloat(val);
                name = 'R' + value_mm;
            } else if (type === 'diameter') {
                var val = prompt('直徑值 (mm):', String(value_mm));
                if (val === null) return;
                value_mm = parseFloat(val);
                name = '⌀' + value_mm;
            }

            var constraint = {
                id: constraintId,
                type: type,
                targets: targets,
                name: name,
            };
            if (value_mm !== null) constraint.value_mm = value_mm;
            if (value_deg !== null) constraint.value_deg = value_deg;

            sketchConstraints.push(constraint);
            callSolver();
        };

        // ── Delete Constraint (click conflict item) ──
        window.deleteConstraint = function(cid) {
            sketchConstraints = sketchConstraints.filter(c => c.id !== cid);
            callSolver();
        };

        // ── Call Solver (interactive, not persisted) ──
        function callSolver() {
            // Notify host to call solve endpoint
            window.opencadNotify({
                type: 'sketch_solve',
                feature_id: sketchFeatureId,
                entities: sketchEntities,
                constraints: sketchConstraints,
            });
        }

        // ── Receive solver result from host ──
        window.opencadSolverResult = function(result) {
            if (!result) return;
            // 防禦：host 若誤傳 JSON 字串（雙重序列化）也能解析
            if (typeof result === 'string') {
                try { result = JSON.parse(result); } catch (e) { return; }
            }
            // Update entities with solved coordinates
            if (result.entities) {
                sketchEntities = result.entities;
                renderSketchEntities();
            }
            // Update DOF status
            if (result.solver_status) {
                updateDofStatus(result.solver_status);
            }
        };

        // ── Update DOF Status Bar ──
        function updateDofStatus(status) {
            var dofText = document.getElementById('dof-text');
            var conflictList = document.getElementById('conflict-list');

            if (status.state === 'full') {
                dofText.textContent = '自由度：0／完全定義';
                dofText.className = 'dof-full';
                conflictList.innerHTML = '';
            } else if (status.state === 'under') {
                dofText.textContent = '自由度：' + status.dof + '／未完全定義';
                dofText.className = 'dof-under';
                conflictList.innerHTML = '';
            } else if (status.state === 'over') {
                dofText.textContent = '自由度：過約束！';
                dofText.className = 'dof-over';
                // Show conflict constraints as clickable items
                var html = '';
                (status.conflicts || []).forEach(function(cid) {
                    html += '<span class="conflict-item" onclick="deleteConstraint(\'' + cid + '\')">衝突: ' + cid + ' ✗</span>';
                });
                conflictList.innerHTML = html;
            }
        }

        // ── Drag Interaction ──
        renderer.domElement.addEventListener('mousedown', function(event) {
            if (!sketchMode || sketchTool !== 'select') return;
            if (sketchSelectedIndex < 0) return;

            var e = sketchEntities[sketchSelectedIndex];
            if (!e) return;

            dragState = {
                entityIdx: sketchSelectedIndex,
                startX: event.clientX,
                startY: event.clientY,
                throttleTimer: null,
            };
        });

        renderer.domElement.addEventListener('mousemove', function(event) {
            if (!dragState) return;

            // Throttle solver calls
            if (dragState.throttleTimer) return;
            dragState.throttleTimer = setTimeout(function() {
                dragState.throttleTimer = null;
                // Calculate drag delta in sketch plane
                var dx = (event.clientX - dragState.startX) * 0.1;  // scale to mm
                var dy = -(event.clientY - dragState.startY) * 0.1;  // invert Y

                // Update entity position based on drag
                var e = sketchEntities[dragState.entityIdx];
                if (e) {
                    var params = e.parameters || e;
                    if (params.center_x !== undefined || params.x !== undefined) {
                        params.center_x = (params.center_x || 0) + dx;
                        params.center_y = (params.center_y || 0) + dy;
                        params.x = params.center_x;
                        params.y = params.center_y;
                    } else if (params.x1 !== undefined) {
                        params.x1 = (params.x1 || 0) + dx;
                        params.y1 = (params.y1 || 0) + dy;
                        params.x2 = (params.x2 || 0) + dx;
                        params.y2 = (params.y2 || 0) + dy;
                    }
                    // Reset start for continuous drag
                    dragState.startX = event.clientX;
                    dragState.startY = event.clientY;
                    // Call solver with updated entities
                    callSolver();
                }
            }, SOLVE_THROTTLE_MS);
        });

        renderer.domElement.addEventListener('mouseup', function() {
            if (dragState && dragState.throttleTimer) {
                clearTimeout(dragState.throttleTimer);
            }
            dragState = null;
        });

        // ── Dimension Label Click → Edit ──
        // Dimension labels are created in renderSketchEntities; clicking one opens edit
        window.editDimension = function(entityIdx, paramKey) {
            var e = sketchEntities[entityIdx];
            if (!e) return;
            var params = e.parameters || e;
            var currentVal = params[paramKey] || 0;
            var newVal = prompt(paramKey + ' 值 (mm):', String(currentVal));
            if (newVal === null) return;
            params[paramKey] = parseFloat(newVal);
            callSolver();
        };

        // ─── 動畫迴圈 ───
        // ─── Triad (座標軸指示器) ───
        const triadScene = new THREE.Scene();
        const triadCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        triadCamera.position.set(0, 0, 5);

        function initTriad() {
            const origin = new THREE.Vector3(0, 0, 0);
            const size = 1.0;
            triadScene.add(new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), origin, size, 0xf38ba8, 0.2, 0.15));
            triadScene.add(new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), origin, size, 0xa6e3a1, 0.2, 0.15));
            triadScene.add(new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), origin, size, 0x89b4fa, 0.2, 0.15));

            const makeLabel = (text, color) => {
                const canvas = document.createElement('canvas');
                canvas.width = 64; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.font = 'Bold 40px sans-serif';
                ctx.fillStyle = color;
                ctx.textAlign = 'center';
                ctx.fillText(text, 32, 48);
                const tex = new THREE.CanvasTexture(canvas);
                const mat = new THREE.SpriteMaterial({ map: tex });
                const sprite = new THREE.Sprite(mat);
                sprite.scale.set(0.6, 0.6, 1);
                return sprite;
            };
            const lx = makeLabel('X', '#f38ba8'); lx.position.set(1.2, 0, 0); triadScene.add(lx);
            const ly = makeLabel('Y', '#a6e3a1'); ly.position.set(0, 1.2, 0); triadScene.add(ly);
            const lz = makeLabel('Z', '#89b4fa'); lz.position.set(0, 0, 1.2); triadScene.add(lz);
        }
        initTriad();

        // ─── Datum Planes (基準面) ───
        const datumGroup = new THREE.Group();
        scene.add(datumGroup);
        const datumPlanes = {};

        function initDatumPlanes() {
            const size = 100;
            const createPlane = (name, rotation, color) => {
                const geometry = new THREE.PlaneGeometry(size, size);
                const material = new THREE.MeshBasicMaterial({
                    color: color, transparent: true, opacity: 0.1, side: THREE.DoubleSide, depthWrite: false
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.rotation.copy(rotation);
                mesh.name = `__plane_${name.toLowerCase()}`;
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ 
                    color: color, transparent: true, opacity: 0.3 
                }));
                mesh.add(line);
                datumGroup.add(mesh);
                datumPlanes[name] = mesh;
            };
            createPlane('XY', new THREE.Euler(0, 0, 0), 0x89b4fa);
            createPlane('XZ', new THREE.Euler(-Math.PI/2, 0, 0), 0xa6e3a1);
            createPlane('YZ', new THREE.Euler(0, Math.PI/2, 0), 0xf38ba8);
        }
        initDatumPlanes();

        // SolidWorks 慣例：基準面預設隱藏；特徵樹選取該面時單獨顯示，
        // 工具列「基準面」按鈕可切換三面常駐顯示（供視窗內點選）。
        const DATUM_COLORS = { XY: 0x89b4fa, XZ: 0xa6e3a1, YZ: 0xf38ba8 };
        let datumPlanesVisible = false;   // 工具列常駐開關
        let datumSelectedName = null;     // 特徵樹目前選取的基準面

        function updateDatumVisibility() {
            for (const key in datumPlanes) {
                const mesh = datumPlanes[key];
                const isSelected = mesh.name === datumSelectedName;
                mesh.visible = datumPlanesVisible || isSelected;
                mesh.material.opacity = isSelected ? 0.4 : 0.1;
                mesh.material.color.set(isSelected ? 0xf9e2af : DATUM_COLORS[key]);
            }
        }
        updateDatumVisibility();  // 初始：全部隱藏

        window.highlightDatumPlane = function(name) {
            datumSelectedName = name || null;
            updateDatumVisibility();
        };

        // ═══ WP1-4: Property Manager / 量測 / 選取 / 顯示模式 ═══

        // WP1-4: 選取過濾器
        let selectionFilter = 'all';  // all, face, edge, vertex
        window.setSelectionFilter = function(filter) {
            selectionFilter = filter;
            console.log('Selection filter:', filter);
        };

        // WP1-4: 顯示模式
        let currentDisplayMode = 'shaded';
        let edgeOverlayGroup = new THREE.Group();
        window.setDisplayMode = function(mode) {
            currentDisplayMode = mode;
            if (!modelGroup) return;
            // Remove existing edge overlay
            if (edgeOverlayGroup) {
                scene.remove(edgeOverlayGroup);
                edgeOverlayGroup = new THREE.Group();
            }
            modelGroup.traverse(function(obj) {
                if (obj.isMesh && obj.material) {
                    switch (mode) {
                        case 'shaded':
                            obj.material.wireframe = false;
                            obj.material.transparent = false;
                            obj.material.opacity = 1.0;
                            break;
                        case 'shaded-with-edges':
                            obj.material.wireframe = false;
                            obj.material.transparent = false;
                            obj.material.opacity = 1.0;
                            // Render edge overlay from display_map（schema 欄位名為 polyline）
                            if (displayMap && displayMap.edges && displayMap.edges.length > 0) {
                                displayMap.edges.forEach(function(edge) {
                                    if (edge.polyline && edge.polyline.length >= 2) {
                                        var pts = edge.polyline.map(function(v) {
                                            return new THREE.Vector3(v[0], v[1], v[2]);
                                        });
                                        var edgeGeom = new THREE.BufferGeometry().setFromPoints(pts);
                                        var edgeLine = new THREE.Line(edgeGeom, new THREE.LineBasicMaterial({
                                            color: 0x333333, linewidth: 1
                                        }));
                                        edgeOverlayGroup.add(edgeLine);
                                    }
                                });
                                // polyline 座標是模型空間——套用與 currentModel 相同的縮放/位移才會貼齊
                                if (currentModel) {
                                    edgeOverlayGroup.position.copy(currentModel.position);
                                    edgeOverlayGroup.quaternion.copy(currentModel.quaternion);
                                    edgeOverlayGroup.scale.copy(currentModel.scale);
                                }
                                scene.add(edgeOverlayGroup);
                            }
                            break;
                        case 'wireframe':
                            obj.material.wireframe = true;
                            obj.material.transparent = false;
                            obj.material.opacity = 1.0;
                            break;
                        case 'transparent':
                            obj.material.wireframe = false;
                            obj.material.transparent = true;
                            obj.material.opacity = 0.3;
                            break;
                    }
                    obj.material.needsUpdate = true;
                }
            });
        };

        // WP1-4: 量測模式
        let measureMode = false;
        let measurePoints = [];
        let measureLabels = [];
        window.enterMeasureMode = function() {
            measureMode = true;
            measurePoints = [];
            console.log('Entered measure mode');
        };
        window.exitMeasureMode = function() {
            measureMode = false;
            measurePoints = [];
            // Clear measure labels
            measureLabels.forEach(function(l) { scene.remove(l); });
            measureLabels = [];
            console.log('Exited measure mode');
        };

        // WP1-4: 隔離/隱藏/顯示特徵
        window.isolateFeature = function(featureId) {
            if (!modelGroup) return;
            modelGroup.traverse(function(obj) {
                if (obj.isMesh) {
                    obj.visible = (obj.userData && obj.userData.featureId === featureId);
                }
            });
        };
        window.hideFeature = function(featureId) {
            if (!modelGroup) return;
            modelGroup.traverse(function(obj) {
                if (obj.isMesh && obj.userData && obj.userData.featureId === featureId) {
                    obj.visible = false;
                }
            });
        };
        window.showAllFeatures = function() {
            if (!modelGroup) return;
            modelGroup.traverse(function(obj) {
                if (obj.isMesh) obj.visible = true;
            });
        };
        window.clearIsolate = function() {
            window.showAllFeatures();
        };

        window.onToggleDatumPlanes = function() {
            datumPlanesVisible = !datumPlanesVisible;
            updateDatumVisibility();
            document.getElementById('btn-datum').classList.toggle('active', datumPlanesVisible);
        };

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (sketchMode) {
                renderer.render(scene, camera);
                updateDimLabelPositions();
            } else {
                renderer.autoClear = false;
                renderer.clear();
                renderer.render(scene, camera);

                // Render Triad
                renderer.clearDepth();
                const triadSize = 100;
                triadCamera.quaternion.copy(camera.quaternion);
                triadCamera.position.set(0, 0, 5).applyQuaternion(camera.quaternion);
                triadCamera.lookAt(0, 0, 0);
                renderer.setViewport(window.innerWidth - triadSize - 10, 10, triadSize, triadSize);
                renderer.render(triadScene, triadCamera);
                renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
            }
        }
        animate();

        // ─── 視窗大小調整 ───
        window.addEventListener('resize', () => {
            if (sketchMode && sketchOrthoCamera) {
                sketchOrthoCamera.left = -window.innerWidth / 2;
                sketchOrthoCamera.right = window.innerWidth / 2;
                sketchOrthoCamera.top = window.innerHeight / 2;
                sketchOrthoCamera.bottom = -window.innerHeight / 2;
                sketchOrthoCamera.updateProjectionMatrix();
            } else {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            }
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
